name: Reusable / Dashboard

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string


permissions:
  contents: read

defaults:
  run:
    working-directory: dashboard

jobs:
  check:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install tygo
        run: go install github.com/gzuidhof/tygo@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate dashboard types
        run: |
          $HOME/go/bin/tygo generate
          npx prettier --write src/generated/types.ts
          git diff --exit-code -- src/generated/types.ts

      - name: TypeScript check
        run: bun run typecheck

      - name: ESLint
        run: bun run lint

      - name: Prettier check
        run: bun run format:check

      - name: Run tests
        run: bun run test:run

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install tygo
        run: go install github.com/gzuidhof/tygo@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate dashboard types
        run: |
          $HOME/go/bin/tygo generate
          npx prettier --write src/generated/types.ts

      - name: Build
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dashboard-dist
          path: dashboard/dist/
          retention-days: 7
