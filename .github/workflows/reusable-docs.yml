name: Reusable / Docs

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string


permissions:
  contents: read

jobs:
  docs-validate:
    name: Validate Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Check docs.json references
        run: |
          echo "🔍 Validating docs.json..."
          ./scripts/check-docs-json.sh
        shell: bash
