name: Reusable / npm

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      version:
        required: false
        type: string


permissions:
  contents: read

jobs:
  verify:
    name: Verify npm Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Verify npm package
        run: bash scripts/check-npm.sh "${{ inputs.version }}"

      - name: List package contents
        working-directory: npm
        run: |
          echo "📦 Package will contain:"
          npm pack --dry-run 2>&1 | grep "notice" | awk '{print "  " $3 " (" $2 ")"}'
